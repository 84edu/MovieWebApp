{% extends "base.html" %}
{% block content %}
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Movies of {{ user_name }}</h1>
        <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">
            <i class="fa-solid fa-arrow-left"></i> Back to Users
        </a>
    </div>

    <div class="card mb-5 shadow-sm">
        <div class="card-body">
            <form action="{{ url_for('user_movies', user_id=user_id) }}" method="POST" class="row g-3">
                <div class="col-md-9">
                    <input type="text" name="title" class="form-control" placeholder="Enter movie title..." required>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-primary w-100">Add Movie</button>
                </div>
            </form>
        </div>
    </div>

    <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
        {% for movie in movies %}
        <div class="col">
            <div class="card h-100 shadow-sm border-0">
                <img src="{{ movie.poster_url }}" class="card-img-top" alt="{{ movie.title }}" style="height: 400px; object-fit: cover;">
                <div class="card-body">
                    <h5 class="card-title text-truncate">{{ movie.title }}</h5>
                    <p class="card-text text-muted small">{{ movie.year }} | Dir: {{ movie.director }}</p>

                    <div class="d-flex justify-content-between mt-3">
                        <form action="{{ url_for('update_movie', user_id=user_id, movie_id=movie.id) }}" method="POST" class="d-flex gap-1">
                            <input type="text" name="title" class="form-control form-control-sm" placeholder="New title">
                            <button class="btn btn-sm btn-outline-info"><i class="fa-solid fa-pen"></i></button>
                        </form>

                        <form action="{{ url_for('delete_movie', user_id=user_id, movie_id=movie.id) }}" method="POST">
                            <button class="btn btn-sm btn-outline-danger" onclick="return confirm('Are you sure you want to delete this movie?')">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
